<article class="team-card">
  <div class="team-card__photo-wrap">
    {{ if .photo }}
    {{ partial "avif-picture.html" (dict "src" .photo "alt" .name "class" "team-card__photo") }}
    {{ else }}
    <div class="team-card__photo team-card__photo--placeholder">
      <span>{{ substr .name 0 1 }}</span>
    </div>
    {{ end }}
  </div>
  <div class="team-card__info">
    <h3 class="team-card__name">{{ .name }}</h3>
    {{ with .role }}
    <p class="team-card__role">{{ . }}</p>
    {{ end }}
    {{ with .social }}
    {{ partial "social-icons.html" . }}
    {{ end }}
  </div>
</article>
